<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ORIZEEN Times</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-main">ORIZEEN</span>
        <span class="logo-sub">Times</span>
      </a>
      <nav class="main-nav">
        <a href="index.html">← Back</a>
      </nav>
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>
      <span class="live-date" id="liveDate"></span>
    </div>
  </header>

  <article class="post-article" id="postArticle">
    <!-- Loaded by JS -->
  </article>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="logo">
        <span class="logo-main">ORIZEEN</span>
        <span class="logo-sub">Times</span>
      </div>
      <p class="footer-copy">© ORIZEEN Times <span id="footerYear"></span>.</p>
    </div>
  </footer>

  <script src="config.js"></script>
  <script src="theme.js"></script>
  <script src="article.js"></script>
</body>
</html>
